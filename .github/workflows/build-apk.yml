name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build PWA & Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'humidity-web-app/package-lock.json'

      - name: Install Node Dependencies
        working-directory: humidity-web-app
        run: npm ci

      - name: Build Vite PWA
        working-directory: humidity-web-app
        run: npm run build

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Prepare Android Assets Directory
        run: |
          rm -rf app/src/main/assets/*
          mkdir -p app/src/main/assets

      - name: Copy Built PWA Assets to Android Project
        run: cp -r humidity-web-app/dist/* app/src/main/assets/

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: relative-humidity-app
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Create or Update GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Release for a specific version tag
            gh release create "${{ github.ref_name }}" \
              --title "Atmosphere ${{ github.ref_name }}" \
              --notes "Automated release of Atmosphere Relative Humidity App APK for version ${{ github.ref_name }}." \
              app/build/outputs/apk/debug/app-debug.apk
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # Rolling release for push/merge to the main branch
            gh release upload latest app/build/outputs/apk/debug/app-debug.apk --clobber || \
            gh release create latest app/build/outputs/apk/debug/app-debug.apk \
              --title "Latest Pre-release" \
              --notes "Automated rolling pre-release from the latest commit on the main branch. Download the raw APK file below." \
              --prerelease
          fi
