<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>💧</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atmosphere - Relative Humidity</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Atmosphere" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Main Background Container -->
      <div class="dashboard-container">
        
        <!-- Header -->
        <header class="header">
          <div class="location-group">
            <div class="location-title-row">
              <!-- Location Pin Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-pin"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              <h1 id="location-name">Checking GPS Location...</h1>
            </div>
            <p id="country-name"></p>
          </div>
          
          <div class="actions-group">
            <button id="btn-refresh" aria-label="Refresh weather data" class="action-btn">
              <!-- Refresh Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-refresh"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
              <!-- Loading Spinner (Hidden by default) -->
              <div class="spinner hidden" id="refresh-spinner"></div>
            </button>
            <button id="btn-search-toggle" aria-label="Toggle Search Panel" class="action-btn">
              <!-- Search Icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
          </div>
        </header>

        <!-- Search Drawer Panel -->
        <div id="search-panel" class="search-panel hidden">
          <form id="search-form" class="search-form">
            <input type="text" id="search-input" placeholder="Search city (e.g. London)" autocomplete="off" />
            <button type="submit" id="btn-search-submit" class="search-submit-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
          </form>
        </div>

        <!-- Glassmorphic Main Display Card -->
        <main class="main-card glass-card">
          <div class="gauge-container">
            <canvas id="humidity-gauge" width="480" height="480"></canvas>
            <div class="gauge-overlay">
              <span id="humidity-value">--%</span>
              <span class="gauge-label">Relative Humidity</span>
            </div>
          </div>
          
          <!-- Comfort pill tag -->
          <div class="comfort-badge-wrapper">
            <div id="comfort-badge" class="comfort-badge">Unknown</div>
          </div>
          
          <!-- Sensor fallback status -->
          <div class="source-status" id="source-status-text">
            Using location services to query local weather stations.
          </div>
        </main>

        <!-- Stat Section Header -->
        <h2 class="section-title">Atmospheric Details</h2>

        <!-- Detail Grid -->
        <section class="details-grid">
          
          <!-- Temperature Card -->
          <div class="detail-card glass-card" id="card-temp" style="cursor: pointer;">
            <div class="detail-header">
              <span class="detail-title">Temperature</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon detail-icon"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
            </div>
            <div class="detail-value" id="temp-value">--</div>
            <div class="detail-subtitle" id="temp-unit-label">Click to toggle F/C</div>
          </div>

          <!-- Dew Point Card -->
          <div class="detail-card glass-card">
            <div class="detail-header">
              <span class="detail-title">Dew Point</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon detail-icon"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/><path d="M18 13a2.5 2.5 0 0 1-2.5 2.5c-1.5 0-2.5-2.5-2.5-2.5s1-2.5 2.5-2.5a2.5 2.5 0 0 1 2.5 2.5Z" fill="currentColor"/></svg>
            </div>
            <div class="detail-value" id="dew-point-value">--</div>
            <div class="detail-subtitle">Condensation temperature</div>
          </div>

          <!-- Absolute Humidity Card -->
          <div class="detail-card glass-card">
            <div class="detail-header">
              <span class="detail-title">Absolute Humidity</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon detail-icon"><path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7Z"/></svg>
            </div>
            <div class="detail-value" id="abs-humidity-value">--</div>
            <div class="detail-subtitle">Water vapor density</div>
          </div>

          <!-- Location Coordinates/Source Card -->
          <div class="detail-card glass-card">
            <div class="detail-header">
              <span class="detail-title">Details & Source</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon detail-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            </div>
            <div class="detail-value" id="weather-description">--</div>
            <div class="detail-subtitle" id="coordinates-value">Offline</div>
          </div>
          
        </section>
      </div>

      <!-- Loading Modal -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner-large"></div>
      </div>

      <!-- Snackbar Error Alert -->
      <div id="error-toast" class="error-toast hidden">
        <span id="error-message">An error occurred</span>
        <button id="btn-error-close" class="error-close-btn">Dismiss</button>
      </div>
      
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
